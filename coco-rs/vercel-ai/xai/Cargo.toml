[package]
name = "vercel-ai-xai"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "xAI (Grok) provider for Vercel AI SDK in Rust"

[dependencies]
vercel-ai-provider.workspace = true
vercel-ai-provider-utils.workspace = true
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "macros", "net"] }
tokio-util = { workspace = true }
# Real-time streaming transcription (WebSocket STT). rustls + webpki roots for
# `wss://`; the crypto provider is installed process-wide by the app binary.
tokio-tungstenite = { workspace = true, features = ["connect", "handshake", "rustls-tls-webpki-roots"] }
futures = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream", "multipart"] }
chrono = { workspace = true }
base64 = { workspace = true }
regex = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
pretty_assertions = { workspace = true }
wiremock = { workspace = true }
insta = { workspace = true, features = ["json"] }
# Cassette record/replay harness. coco-cassette has no vercel-ai dependency, so
# this dev-dep introduces no cycle and trips no seam guard.
coco-cassette = { workspace = true }

[lints]
workspace = true
